---

name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/prepare-poetry
        with:
          python-version: "3.12"

      - name: mypy
        run: poetry run mypy resqpy

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/prepare-poetry
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run pytest
        run: poetry run pytest --cov=resqpy --cov-report=xml --junitxml=pytest.xml
    
      - name: Upload pytest artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: Unit Test Results (Python ${{ matrix.python-version }})
          path: pytest.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true

  legacy-dependencies:
    # Test against older versions of numpy and pandas,
    # To ensure resqpy works with the lower bounds of our published constraints

    name: Unit tests (older dependencies)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/prepare-poetry
        with:
          python-version: "3.10"

      - name: Downgrade numpy and pandas
        # Use caret-style requirements (~) to fix minor version but allow patches
        run: |
          poetry add numpy@~1.26 pandas@~2.2
          poetry show

      - name: Run pytest
        run: poetry run pytest
